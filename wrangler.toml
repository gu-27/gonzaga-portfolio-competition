name = "gonzaga-portfolio-competition"
pages_build_output_dir = "."
compatibility_date = "2026-01-01"

# ── Non-secret config (safe to commit). Secrets go via `wrangler pages secret put`. ──
[vars]
SUBMISSIONS_OPEN = "true"                       # flip to "false" to hard-close submissions early
DEADLINE_ISO     = "2026-08-24T23:59:59-07:00"  # Aug 24, 2026 · 11:59pm Pacific — server rejects after this
# TURNSTILE_SECRET is a SECRET, set it with: wrangler pages secret put TURNSTILE_SECRET
# (The public Turnstile site key lives in submit.html — see DEPLOY.md. Bot protection is OFF until both are set.)

# ── D1: portfolio submissions (one row per entry) ──
# Create it once with `wrangler d1 create gpc_submissions`, then paste the returned id below.
[[d1_databases]]
binding       = "DB"
database_name = "gpc_submissions"
database_id   = "PASTE_DATABASE_ID_FROM_wrangler_d1_create"
